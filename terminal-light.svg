<svg xmlns="http://www.w3.org/2000/svg" width="900" height="420" viewBox="0 0 900 420">
  <defs>
    <linearGradient id="termBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8f8fc"/>
      <stop offset="100%" stop-color="#f0f0f5"/>
    </linearGradient>
    <linearGradient id="scanline" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6d3ed800"/>
      <stop offset="45%" stop-color="#6d3ed806"/>
      <stop offset="55%" stop-color="#6d3ed806"/>
      <stop offset="100%" stop-color="#6d3ed800"/>
    </linearGradient>
  </defs>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&amp;display=swap');

    text { font-family: 'JetBrains Mono', 'Courier New', monospace; }

    .terminal-frame { fill: url(#termBg); stroke: #e0e0e8; stroke-width: 1; rx: 12; }
    .titlebar { fill: #ebebf0; }
    .btn-red { fill: #ff5f57; }
    .btn-yellow { fill: #febc2e; }
    .btn-green { fill: #28c840; }
    .title-text { fill: #999; font-size: 12px; }

    .prompt { fill: #6d3ed8; font-size: 13px; font-weight: 700; }
    .command { fill: #1a1a1a; font-size: 13px; }
    .output { fill: #555; font-size: 12px; }
    .highlight { fill: #6d3ed8; font-size: 12px; }
    .accent-green { fill: #059669; font-size: 12px; }
    .accent-blue { fill: #2563eb; font-size: 12px; }
    .accent-yellow { fill: #d97706; font-size: 12px; }
    .accent-red { fill: #dc2626; font-size: 12px; }
    .dim { fill: #999; font-size: 12px; }

    .bar-bg { fill: #e2e2ea; rx: 2; }
    .bar-purple { fill: #6d3ed8; rx: 2; }
    .bar-blue { fill: #2563eb; rx: 2; }
    .bar-green { fill: #059669; rx: 2; }
    .bar-yellow { fill: #d97706; rx: 2; }
    .bar-red { fill: #dc2626; rx: 2; }

    .scanline-bar {
      animation: scan 4s linear infinite;
    }
    @keyframes scan {
      0% { transform: translateY(-30px); }
      100% { transform: translateY(420px); }
    }

    .cursor {
      animation: blink 1s step-end infinite;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }

    .line { opacity: 0; animation: fadeIn 0.3s ease forwards; }
    .line-1 { animation-delay: 0.2s; }
    .line-2 { animation-delay: 0.5s; }
    .line-3 { animation-delay: 0.8s; }
    .line-4 { animation-delay: 1.0s; }
    .line-5 { animation-delay: 1.2s; }
    .line-6 { animation-delay: 1.4s; }
    .line-7 { animation-delay: 1.6s; }
    .line-8 { animation-delay: 1.8s; }
    .line-9 { animation-delay: 2.0s; }
    .line-10 { animation-delay: 2.2s; }
    .line-11 { animation-delay: 2.4s; }
    .line-12 { animation-delay: 2.6s; }
    .line-13 { animation-delay: 2.8s; }
    .line-14 { animation-delay: 3.0s; }
    .line-15 { animation-delay: 3.2s; }
    .line-16 { animation-delay: 3.5s; }

    @keyframes fadeIn {
      to { opacity: 1; }
    }

    .pulse {
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 1; }
    }
  </style>

  <!-- Terminal Frame -->
  <rect class="terminal-frame" x="0" y="0" width="900" height="420" rx="12"/>

  <!-- Scanline overlay -->
  <rect class="scanline-bar" x="0" y="0" width="900" height="30" fill="url(#scanline)" opacity="0.5"/>

  <!-- Title bar -->
  <rect class="titlebar" x="1" y="1" width="898" height="36" rx="12"/>
  <rect class="titlebar" x="1" y="25" width="898" height="12"/>
  <circle class="btn-red" cx="22" cy="19" r="6"/>
  <circle class="btn-yellow" cx="42" cy="19" r="6"/>
  <circle class="btn-green" cx="62" cy="19" r="6"/>
  <text class="title-text" x="450" y="23" text-anchor="middle">avelyx@zurich — system monitor</text>

  <line x1="0" y1="37" x2="900" y2="37" stroke="#e0e0e8" stroke-width="1"/>

  <!-- Terminal content -->
  <g transform="translate(28, 60)">

    <g class="line line-1">
      <text class="prompt" y="0">$</text>
      <text class="command" x="18" y="0">avelyx --status</text>
    </g>

    <g class="line line-2">
      <text class="output" y="24">┌──────────────────────────────────────────────────────────────────────────────────┐</text>
    </g>

    <g class="line line-3">
      <text class="output" y="44">│</text>
      <text class="highlight" x="16" y="44">  SYSTEMS</text>
      <text class="output" x="104" y="44">│</text>
      <text class="dim" x="120" y="44">uptime</text>
      <text class="accent-green" x="192" y="44">2,147 days</text>
      <text class="output" x="326" y="44">│</text>
      <text class="dim" x="342" y="44">projects</text>
      <text class="accent-blue" x="432" y="44">14 active</text>
      <text class="output" x="548" y="44">│</text>
      <text class="dim" x="564" y="44">location</text>
      <text class="output" x="654" y="44">zurich, ch</text>
      <text class="output" x="796" y="44">│</text>
    </g>

    <g class="line line-4">
      <text class="output" y="64">└──────────────────────────────────────────────────────────────────────────────────┘</text>
    </g>

    <g class="line line-5">
      <text class="prompt" y="92">$</text>
      <text class="command" x="18" y="92">stack --breakdown</text>
    </g>

    <g class="line line-6" transform="translate(0, 112)">
      <text class="dim" y="0">frontend</text>
      <rect class="bar-bg" x="100" y="-10" width="300" height="14"/>
      <rect class="bar-purple" x="100" y="-10" width="258" height="14">
        <animate attributeName="width" from="0" to="258" dur="1s" begin="1.6s" fill="freeze"/>
      </rect>
      <text class="output" x="410" y="0">86%</text>
      <text class="dim" x="450" y="0">react · next.js · gsap · three.js</text>
    </g>

    <g class="line line-7" transform="translate(0, 132)">
      <text class="dim" y="0">backend</text>
      <rect class="bar-bg" x="100" y="-10" width="300" height="14"/>
      <rect class="bar-blue" x="100" y="-10" width="234" height="14">
        <animate attributeName="width" from="0" to="234" dur="1s" begin="1.8s" fill="freeze"/>
      </rect>
      <text class="output" x="410" y="0">78%</text>
      <text class="dim" x="450" y="0">node · python · supabase · postgres</text>
    </g>

    <g class="line line-8" transform="translate(0, 152)">
      <text class="dim" y="0">ai / ml</text>
      <rect class="bar-bg" x="100" y="-10" width="300" height="14"/>
      <rect class="bar-green" x="100" y="-10" width="270" height="14">
        <animate attributeName="width" from="0" to="270" dur="1s" begin="2.0s" fill="freeze"/>
      </rect>
      <text class="output" x="410" y="0">90%</text>
      <text class="dim" x="450" y="0">claude · gemini · n8n · pipelines</text>
    </g>

    <g class="line line-9" transform="translate(0, 172)">
      <text class="dim" y="0">cloud</text>
      <rect class="bar-bg" x="100" y="-10" width="300" height="14"/>
      <rect class="bar-yellow" x="100" y="-10" width="216" height="14">
        <animate attributeName="width" from="0" to="216" dur="1s" begin="2.2s" fill="freeze"/>
      </rect>
      <text class="output" x="410" y="0">72%</text>
      <text class="dim" x="450" y="0">azure · hetzner · docker · linux</text>
    </g>

    <g class="line line-10" transform="translate(0, 192)">
      <text class="dim" y="0">design</text>
      <rect class="bar-bg" x="100" y="-10" width="300" height="14"/>
      <rect class="bar-red" x="100" y="-10" width="246" height="14">
        <animate attributeName="width" from="0" to="246" dur="1s" begin="2.4s" fill="freeze"/>
      </rect>
      <text class="output" x="410" y="0">82%</text>
      <text class="dim" x="450" y="0">figma · motion · ui/ux · branding</text>
    </g>

    <g class="line line-11">
      <text class="prompt" y="224">$</text>
      <text class="command" x="18" y="224">ps aux --active</text>
    </g>

    <g class="line line-12">
      <text class="dim" y="248">PID</text>
      <text class="dim" x="56" y="248">SERVICE</text>
      <text class="dim" x="280" y="248">STATUS</text>
      <text class="dim" x="400" y="248">UPTIME</text>
      <text class="dim" x="520" y="248">CPU</text>
    </g>

    <g class="line line-13">
      <text class="output" y="268">001</text>
      <text class="highlight" x="56" y="268">avelyx-studio</text>
      <circle cx="288" cy="264" r="4" class="accent-green pulse"/>
      <text class="accent-green" x="300" y="268">running</text>
      <text class="output" x="400" y="268">186d</text>
      <text class="output" x="520" y="268">||||||||||</text>
    </g>

    <g class="line line-14">
      <text class="output" y="288">002</text>
      <text class="accent-blue" x="56" y="288">trading-bot</text>
      <circle cx="288" cy="284" r="4" class="accent-green pulse"/>
      <text class="accent-green" x="300" y="288">running</text>
      <text class="output" x="400" y="288">94d</text>
      <text class="output" x="520" y="288">||||||||</text>
    </g>

    <g class="line line-15">
      <text class="output" y="308">003</text>
      <text class="accent-yellow" x="56" y="308">n8n-workflows</text>
      <circle cx="288" cy="304" r="4" class="accent-green pulse"/>
      <text class="accent-green" x="300" y="308">running</text>
      <text class="output" x="400" y="308">241d</text>
      <text class="output" x="520" y="308">|||||||</text>
    </g>

    <g class="line line-16">
      <text class="prompt" y="340">$</text>
      <rect class="cursor" x="18" y="328" width="8" height="16" fill="#6d3ed8"/>
    </g>

  </g>
</svg>