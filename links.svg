<svg width="100%" viewBox="0 0 500 50" fill="none" xmlns="http://www.w3.org/2000/svg">
  <foreignObject width="100%" height="100%">
    <div xmlns="http://www.w3.org/1999/xhtml">
      <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&amp;display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        .wrap {
          width: 100%; height: 50px;
          display: flex; align-items: center; justify-content: center; gap: 32px;
          font-family: 'JetBrains Mono', monospace;
          background: transparent;
        }
        .link {
          display: flex; align-items: center; gap: 8px;
          font-size: 13px; color: rgba(139,92,246,0.7);
          letter-spacing: 0.05em;
          animation: fadeSlide 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
          opacity: 0;
        }
        .link:nth-child(1) { animation-delay: 0.2s; }
        .link:nth-child(2) { animation-delay: 0.35s; }
        .link:nth-child(3) { animation-delay: 0.5s; }
        @keyframes fadeSlide {
          from { opacity: 0; transform: translateY(8px); }
          to { opacity: 1; transform: translateY(0); }
        }
        .dot {
          width: 6px; height: 6px; border-radius: 50%;
          background: rgba(139,92,246,0.5);
          animation: dotPulse 3s ease-in-out infinite;
        }
        .link:nth-child(1) .dot { animation-delay: 0s; }
        .link:nth-child(2) .dot { animation-delay: 1s; }
        .link:nth-child(3) .dot { animation-delay: 2s; }
        @keyframes dotPulse {
          0%, 100% { opacity: 0.4; transform: scale(1); }
          50% { opacity: 1; transform: scale(1.4); }
        }
        .sep {
          width: 1px; height: 16px;
          background: rgba(255,255,255,0.1);
        }
      </style>
      <div class="wrap">
        <div class="link">
          <div class="dot"></div>
          avelyxstudio.ch
        </div>
        <div class="sep"></div>
        <div class="link">
          <div class="dot"></div>
          info@avelyxstudio.ch
        </div>
        <div class="sep"></div>
        <div class="link">
          <div class="dot"></div>
          zurich, switzerland
        </div>
      </div>
    </div>
  </foreignObject>
</svg>
