<svg width="100%" viewBox="0 0 1200 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <foreignObject width="100%" height="100%">
    <div xmlns="http://www.w3.org/1999/xhtml">
      <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&amp;family=JetBrains+Mono:wght@400;700&amp;display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        .c { width: 1200px; height: 300px; background: #060611; position: relative; overflow: hidden; font-family: 'Space Grotesk', sans-serif; }

        /* ═══ GRADIENT MESH — like SCE hero-mesh ═══ */
        .mesh {
          position: absolute; top: 0; left: 0; width: 100%; height: 100%;
          background:
            radial-gradient(ellipse 100% 80% at 10% 20%, rgba(0,120,212,0.15) 0%, transparent 50%),
            radial-gradient(ellipse 80% 60% at 90% 80%, rgba(93,173,226,0.1) 0%, transparent 50%),
            radial-gradient(ellipse 60% 80% at 50% 50%, rgba(0,60,120,0.08) 0%, transparent 50%);
          animation: md 12s ease-in-out infinite;
        }
        @keyframes md { 0%,100%{transform:translate(0,0)}50%{transform:translate(15px,-10px)} }

        /* ═══ FLOATING ORBS — blurred gradient spheres ═══ */
        .orb {
          position: absolute; border-radius: 50%;
        }
        .o1 {
          width: 350px; height: 350px; top: -120px; left: -60px;
          background-color: rgba(0,100,200,0.2);
          animation: of1 16s ease-in-out infinite;
        }
        .o2 {
          width: 250px; height: 250px; bottom: -100px; right: -40px;
          background-color: rgba(93,173,226,0.15);
          animation: of2 20s ease-in-out infinite;
        }
        .o3 {
          width: 180px; height: 180px; top: 40%; left: 55%;
          background-color: rgba(0,80,180,0.08);
          animation: of3 14s ease-in-out infinite;
        }
        @keyframes of1 { 0%,100%{transform:translate(0,0) scale(1)}25%{transform:translate(40px,20px) scale(1.1)}50%{transform:translate(20px,40px) scale(0.95)}75%{transform:translate(50px,10px) scale(1.05)} }
        @keyframes of2 { 0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(-30px,-20px) scale(1.1)}66%{transform:translate(-15px,-35px) scale(0.9)} }
        @keyframes of3 { 0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(-25px,15px) scale(1.15)} }

        /* ═══ GRID OVERLAY — subtle tech grid ═══ */
        .grid {
          position: absolute; top: 0; left: 0; width: 100%; height: 100%;
          background-image:
            linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
            linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
          background-size: 60px 60px;
          opacity: 0.6;
        }

        /* ═══ PARTICLE DRIFT ANIMATIONS ═══ */
        @keyframes d1 { 0%,100%{transform:translate(0,0)}25%{transform:translate(12px,-16px)}50%{transform:translate(22px,-8px)}75%{transform:translate(8px,6px)} }
        @keyframes d2 { 0%,100%{transform:translate(0,0)}50%{transform:translate(16px,-14px)} }
        @keyframes d3 { 0%,100%{transform:translate(0,0)}50%{transform:translate(-14px,16px)} }
        @keyframes d4 { 0%,100%{transform:translate(0,0)}50%{transform:translate(14px,-12px)} }
        @keyframes d5 { 0%,100%{transform:translate(0,0)}50%{transform:translate(-16px,14px)} }
        @keyframes d6 { 0%,100%{transform:translate(0,0)}25%{transform:translate(-12px,10px)}50%{transform:translate(-18px,16px)}75%{transform:translate(-6px,4px)} }
        @keyframes d7 { 0%,100%{transform:translate(0,0)}50%{transform:translate(14px,-12px)} }
        @keyframes d8 { 0%,100%{transform:translate(0,0)}50%{transform:translate(-12px,16px)} }

        /* ═══ TITLE ═══ */
        @keyframes lr { 0%{opacity:0;transform:translateY(30px) scale(0.8);filter:blur(10px)}60%{opacity:1;transform:translateY(-5px) scale(1.02);filter:blur(0)}100%{opacity:1;transform:translateY(0) scale(1);filter:blur(0)} }
        @keyframes dr { from{opacity:0;transform:scale(0)}to{opacity:1;transform:scale(1)} }
        @keyframes le { to{width:240px} }
        @keyframes fs { from{opacity:0;transform:translateY(15px)}to{opacity:1;transform:translateY(0)} }
        @keyframes bl { 0%,100%{opacity:1}50%{opacity:0} }

        .tw { position:absolute;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:5 }
        .tl { display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:20px }
        .le { font-size:56px;font-weight:700;color:#ffffff;letter-spacing:0.12em;opacity:0;animation:lr 0.8s cubic-bezier(0.16,1,0.3,1) forwards }
        .le:nth-child(1){animation-delay:.3s}.le:nth-child(3){animation-delay:.5s}.le:nth-child(5){animation-delay:.7s}.le:nth-child(7){animation-delay:.9s}.le:nth-child(9){animation-delay:1.1s}.le:nth-child(11){animation-delay:1.3s}
        .dt { font-size:18px;color:rgba(93,173,226,0.4);opacity:0;animation:dr 0.5s ease forwards }
        .dt:nth-child(2){animation-delay:.4s}.dt:nth-child(4){animation-delay:.6s}.dt:nth-child(6){animation-delay:.8s}.dt:nth-child(8){animation-delay:1s}.dt:nth-child(10){animation-delay:1.2s}
        .al { width:0;height:1px;background:linear-gradient(90deg,transparent,rgba(93,173,226,0.35),transparent);margin:16px auto;animation:le 1.2s cubic-bezier(0.16,1,0.3,1) 1.5s forwards }
        .st { font-family:'JetBrains Mono',monospace;font-size:13px;color:rgba(255,255,255,0.25);letter-spacing:0.35em;text-transform:uppercase;opacity:0;animation:fs 1s ease 1.8s forwards;display:flex;align-items:center;justify-content:center;gap:4px }
        .cu { display:inline-block;width:2px;height:13px;background-color:rgba(93,173,226,0.4);animation:bl 1s step-end infinite;margin-left:4px }
      </style>

