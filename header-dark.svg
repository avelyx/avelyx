        <div style="position:absolute;border-radius:50%;width:3px;height:3px;top:252px;left:1110px;background-color:rgba(56,189,248,0.25);animation:d5 16s ease-in-out infinite;z-index:3"></div>

        <!-- Small ambient -->
        <div style="position:absolute;border-radius:50%;width:2px;height:2px;top:18px;left:162px;background-color:rgba(56,189,248,0.18);animation:d7 25s ease-in-out infinite;z-index:3"></div>
        <div style="position:absolute;border-radius:50%;width:2px;height:2px;top:72px;left:98px;background-color:rgba(255,255,255,0.12);animation:d2 27s ease-in-out infinite;z-index:3"></div>
        <div style="position:absolute;border-radius:50%;width:2px;height:2px;top:205px;left:198px;background-color:rgba(14,165,233,0.12);animation:d8 24s ease-in-out infinite;z-index:3"></div>
        <div style="position:absolute;border-radius:50%;width:2px;height:2px;top:148px;left:228px;background-color:rgba(255,255,255,0.12);animation:d3 22s ease-in-out infinite;z-index:3"></div>
        <div style="position:absolute;border-radius:50%;width:2px;height:2px;top:88px;left:382px;background-color:rgba(56,189,248,0.12);animation:d5 28s ease-in-out infinite;z-index:3"></div>
        <div style="position:absolute;border-radius:50%;width:2px;height:2px;top:22px;left:512px;background-color:rgba(56,189,248,0.12);animation:d1 28s ease-in-out infinite;z-index:3"></div>
