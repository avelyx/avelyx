        .l2  { top: 100px; left: 183px; width: 85px;  height: 2px; background-color: rgba(93,173,226,0.25); transform: rotate(-40deg); }
        .l3  { top: 48px;  left: 83px;  width: 148px; height: 2px; background-color: rgba(139,92,246,0.25); transform: rotate(62deg); }
        .l4  { top: 178px; left: 140px; width: 118px; height: 2px; background-color: rgba(139,92,246,0.2); transform: rotate(26deg); }
