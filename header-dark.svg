        .l6  { top: 128px; left: 340px; width: 102px; height: 2px; background-color: rgba(93,173,226,0.22); transform: rotate(-48deg); }
        .l7  { top: 100px; left: 183px; width: 168px; height: 2px; background-color: rgba(139,92,246,0.15); transform: rotate(10deg); }
        .l8  { top: 178px; left: 142px; width: 142px; height: 2px; background-color: rgba(93,173,226,0.2); transform: rotate(20deg); }
        .l9  { top: 128px; left: 340px; width: 135px; height: 2px; background-color: rgba(168,216,240,0.15); transform: rotate(48deg); }

        /* RIGHT */
        .l10 { top: 42px;  left: 775px; width: 102px; height: 2px; background-color: rgba(139,92,246,0.3); transform: rotate(24deg); }
        .l11 { top: 88px;  left: 868px; width: 100px; height: 2px; background-color: rgba(93,173,226,0.25); transform: rotate(-32deg); }
        .l12 { top: 38px;  left: 958px; width: 120px; height: 2px; background-color: rgba(168,216,240,0.25); transform: rotate(15deg); }
        .l13 { top: 88px;  left: 868px; width: 92px;  height: 2px; background-color: rgba(93,173,226,0.28); transform: rotate(58deg); }
        .l14 { top: 168px; left: 915px; width: 128px; height: 2px; background-color: rgba(139,92,246,0.2); transform: rotate(15deg); }
        .l15 { top: 72px;  left: 1072px; width: 138px; height: 2px; background-color: rgba(168,216,240,0.15); transform: rotate(72deg); }
        .l16 { top: 42px;  left: 775px; width: 205px; height: 2px; background-color: rgba(139,92,246,0.12); transform: rotate(72deg); }
        .l17 { top: 248px; left: 828px; width: 220px; height: 2px; background-color: rgba(139,92,246,0.2); transform: rotate(-5deg); }
        .l18 { top: 200px; left: 1035px; width: 105px; height: 2px; background-color: rgba(168,216,240,0.15); transform: rotate(32deg); }

        /* BOTTOM */
        .l19 { top: 242px; left: 60px;  width: 420px; height: 2px; background-color: rgba(139,92,246,0.08); transform: rotate(3deg); }
        .l20 { top: 230px; left: 270px; width: 210px; height: 2px; background-color: rgba(93,173,226,0.1); transform: rotate(8deg); }
        .l21 { top: 262px; left: 478px; width: 205px; height: 2px; background-color: rgba(139,92,246,0.12); transform: rotate(1deg); }
        .l22 { top: 265px; left: 678px; width: 155px; height: 2px; background-color: rgba(93,173,226,0.1); transform: rotate(-8deg); }

        /* ══════ TITLE ══════ */
        .title-wrap {
          position: absolute; top: 0; left: 0; width: 100%; height: 100%;
          display: flex; flex-direction: column; align-items: center; justify-content: center;
          z-index: 2;
        }
        .title-letters { display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 20px; }
        .letter {
          font-size: 52px; font-weight: 700; color: #ffffff;
          letter-spacing: 0.05em; opacity: 0;
          animation: letterReveal 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        .letter:nth-child(1) { animation-delay: 0.3s; }
        .letter:nth-child(3) { animation-delay: 0.5s; }
        .letter:nth-child(5) { animation-delay: 0.7s; }
        .letter:nth-child(7) { animation-delay: 0.9s; }
        .letter:nth-child(9) { animation-delay: 1.1s; }
        .letter:nth-child(11) { animation-delay: 1.3s; }
        @keyframes letterReveal {
          0% { opacity: 0; transform: translateY(30px) scale(0.8); filter: blur(10px); }
          60% { opacity: 1; transform: translateY(-5px) scale(1.02); filter: blur(0); }
          100% { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
        }
        .dot {
          font-size: 18px; color: rgba(139,92,246,0.6);
          opacity: 0; animation: dotReveal 0.5s ease forwards;
        }
        .dot:nth-child(2) { animation-delay: 0.4s; }
        .dot:nth-child(4) { animation-delay: 0.6s; }
        .dot:nth-child(6) { animation-delay: 0.8s; }
        .dot:nth-child(8) { animation-delay: 1.0s; }
        .dot:nth-child(10) { animation-delay: 1.2s; }
        @keyframes dotReveal {
          from { opacity: 0; transform: scale(0); }
          to { opacity: 1; transform: scale(1); }
        }
        .accent-line {
          width: 0; height: 1px;
          background: linear-gradient(90deg, transparent, rgba(139,92,246,0.6), transparent);
          margin: 16px auto;
          animation: lineExpand 1.2s cubic-bezier(0.16, 1, 0.3, 1) 1.5s forwards;
        }
        @keyframes lineExpand { to { width: 240px; } }
        .subtitle {
          font-family: 'JetBrains Mono', monospace; font-size: 14px;
          color: rgba(255,255,255,0.35); letter-spacing: 0.3em;
          text-transform: uppercase; opacity: 0;
          animation: fadeSlideUp 1s ease 1.8s forwards;
          display: flex; align-items: center; justify-content: center; gap: 4px;
        }
        .cursor {
          display: inline-block; width: 2px; height: 14px;
          background-color: rgba(139,92,246,0.6);
          animation: blink 1s step-end infinite;
          margin-left: 4px;
        }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
        @keyframes fadeSlideUp {
          from { opacity: 0; transform: translateY(15px); }
          to { opacity: 1; transform: translateY(0); }
        }
      </style>

      <div class="container">
        <!-- LINES first (behind dots) -->
        <div class="l l1"></div><div class="l l2"></div><div class="l l3"></div>
        <div class="l l4"></div><div class="l l5"></div><div class="l l6"></div>
        <div class="l l7"></div><div class="l l8"></div><div class="l l9"></div>
