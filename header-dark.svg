<svg width="100%" viewBox="0 0 1200 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <foreignObject width="100%" height="100%">
    <div xmlns="http://www.w3.org/1999/xhtml">
      <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;700;900&amp;family=JetBrains+Mono:wght@300;400&amp;display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        .c {
          width: 1200px; height: 300px;
          background: linear-gradient(165deg, #0a0a12 0%, #0d0b1a 40%, #110e24 70%, #0a0a12 100%);
          position: relative; overflow: hidden;
          font-family: 'Inter', -apple-system, sans-serif;
        }

        /* ═══ AMBIENT GLOW ORBS ═══ */
        .o1 {
          position:absolute; border-radius:50%;
          width: 500px; height: 500px; top: -200px; left: -100px;
          background-color: rgba(139,92,246,0.12);
          animation: of1 20s ease-in-out infinite;
        }
        .o2 {
          position:absolute; border-radius:50%;
          width: 400px; height: 400px; bottom: -200px; right: -80px;
          background-color: rgba(124,58,237,0.08);
          animation: of2 24s ease-in-out infinite;
        }
        .o3 {
          position:absolute; border-radius:50%;
          width: 250px; height: 250px; top: 20%; left: 50%;
          background-color: rgba(167,139,250,0.04);
          animation: of3 18s ease-in-out infinite;
        }
        @keyframes of1 { 0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(60px,35px) scale(1.1)}66%{transform:translate(30px,55px) scale(0.95)} }
        @keyframes of2 { 0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(-45px,-30px) scale(1.1)} }
        @keyframes of3 { 0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(-30px,20px) scale(1.2)} }

        /* ═══ NOISE/GRAIN TEXTURE ═══ */
        .grain {
          position:absolute; top:0; left:0; width:100%; height:100%;
          background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
          opacity: 0.4;
        }

        /* ═══ SCAN BEAM ═══ */
        .scan {
          position:absolute; top:0; left:-40%; width:30%; height:100%;
          background: linear-gradient(90deg, transparent, rgba(139,92,246,0.03), rgba(139,92,246,0.06), rgba(139,92,246,0.03), transparent);
          animation: sweep 10s linear infinite;
        }
        @keyframes sweep { 0%{left:-30%}100%{left:130%} }

        /* ═══ EDGE ACCENTS ═══ */
        .et {
          position:absolute; top:0; left:0; width:100%; height:1px;
          background: linear-gradient(90deg, transparent 10%, rgba(139,92,246,0.2) 50%, transparent 90%);
        }
        .eb {
          position:absolute; bottom:0; left:0; width:100%; height:1px;
          background: linear-gradient(90deg, transparent 10%, rgba(139,92,246,0.12) 50%, transparent 90%);
        }

        /* ═══ PARTICLES ═══ */
        @keyframes d1 { 0%,100%{transform:translate(0,0)}25%{transform:translate(12px,-16px)}50%{transform:translate(22px,-8px)}75%{transform:translate(8px,6px)} }
        @keyframes d2 { 0%,100%{transform:translate(0,0)}50%{transform:translate(16px,-14px)} }
        @keyframes d3 { 0%,100%{transform:translate(0,0)}50%{transform:translate(-14px,16px)} }
        @keyframes d4 { 0%,100%{transform:translate(0,0)}50%{transform:translate(14px,-12px)} }
        @keyframes d5 { 0%,100%{transform:translate(0,0)}50%{transform:translate(-16px,14px)} }
        @keyframes d6 { 0%,100%{transform:translate(0,0)}25%{transform:translate(-12px,10px)}50%{transform:translate(-18px,16px)}75%{transform:translate(-6px,4px)} }
        @keyframes d7 { 0%,100%{transform:translate(0,0)}50%{transform:translate(14px,-12px)} }
        @keyframes d8 { 0%,100%{transform:translate(0,0)}50%{transform:translate(-12px,16px)} }

        /* ═══ TITLE ═══ */
        @keyframes lr {
          0% { opacity:0; transform:translateY(20px); filter:blur(12px); }
          100% { opacity:1; transform:translateY(0); filter:blur(0); }
        }
        @keyframes dr { from{opacity:0}to{opacity:1} }
        @keyframes le { to{width:320px} }
        @keyframes fs { from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)} }
        @keyframes bl { 0%,100%{opacity:1}50%{opacity:0} }

        .tw { position:absolute;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:5 }
        .tl { display:flex;align-items:center;justify-content:center;gap:4px;margin-bottom:24px }
        .le {
          font-size:64px; font-weight:200; color:rgba(255,255,255,0.95);
          letter-spacing:0.3em;
          opacity:0; animation:lr 1.2s cubic-bezier(0.16,1,0.3,1) forwards;
        }
        .le:nth-child(1){animation-delay:.2s}.le:nth-child(2){animation-delay:.32s}.le:nth-child(3){animation-delay:.44s}.le:nth-child(4){animation-delay:.56s}.le:nth-child(5){animation-delay:.68s}.le:nth-child(6){animation-delay:.8s}
        .al {
          width:0; height:1px;
          background:linear-gradient(90deg, transparent, rgba(139,92,246,0.5), rgba(167,139,250,0.8), rgba(139,92,246,0.5), transparent);
          margin:0 auto 20px;
          animation:le 1s cubic-bezier(0.16,1,0.3,1) 1.2s forwards;
        }
        .st {
          font-family:'JetBrains Mono',monospace; font-size:11px; font-weight:300;
          color:rgba(167,139,250,0.45); letter-spacing:0.5em;
          text-transform:uppercase; opacity:0;
          animation:fs 1s ease 1.6s forwards;
          display:flex; align-items:center; gap:4px;
        }
        .cu { display:inline-block;width:1px;height:11px;background-color:rgba(139,92,246,0.5);animation:bl 1.2s step-end infinite;margin-left:2px }
      </style>

