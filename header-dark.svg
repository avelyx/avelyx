<svg width="100%" viewBox="0 0 1200 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <foreignObject width="100%" height="100%">
    <div xmlns="http://www.w3.org/1999/xhtml">
      <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&amp;family=JetBrains+Mono:wght@400;700&amp;display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }

        .container {
          width: 1200px; height: 300px; background: #0a0a0a;
          position: relative; overflow: hidden; font-family: 'Space Grotesk', sans-serif;
        }

        /* ══════ TANGLE — using simple absolute positioned divs ══════ */

        /* Particles */
        .p {
          position: absolute;
          border-radius: 50%;
          background-color: rgba(139,92,246,0.6);
        }

        /* Lines */
        .l {
          position: absolute;
          height: 1px;
          transform-origin: 0 50%;
          background-color: rgba(139,92,246,0.2);
        }

        /* ── LEFT cluster particles ── */
        .p1  { width: 22px; height: 22px; top: 30px; left: 70px; background-color: rgba(139,92,246,0.8); animation: f1 16s ease-in-out infinite; }
        .p2  { width: 14px; height: 14px; top: 90px; left: 175px; background-color: rgba(93,173,226,0.7); animation: f2 20s ease-in-out infinite; }
        .p3  { width: 10px; height: 10px; top: 30px; left: 250px; background-color: rgba(168,216,240,0.6); animation: f3 18s ease-in-out infinite; }
        .p4  { width: 16px; height: 16px; top: 168px; left: 130px; background-color: rgba(139,92,246,0.7); animation: f4 22s ease-in-out infinite; }
        .p5  { width: 10px; height: 10px; top: 235px; left: 50px; background-color: rgba(93,173,226,0.5); animation: f5 21s ease-in-out infinite; }
        .p6  { width: 18px; height: 18px; top: 115px; left: 330px; background-color: rgba(93,173,226,0.75); animation: f6 17s ease-in-out infinite; }
        .p7  { width: 10px; height: 10px; top: 48px; left: 410px; background-color: rgba(168,216,240,0.5); animation: f7 19s ease-in-out infinite; }
        .p8  { width: 12px; height: 12px; top: 220px; left: 260px; background-color: rgba(93,173,226,0.5); animation: f8 23s ease-in-out infinite; }

        /* ── RIGHT cluster particles ── */
        .p9  { width: 24px; height: 24px; top: 28px; left: 760px; background-color: rgba(139,92,246,0.8); animation: f9 18s ease-in-out infinite; }
        .p10 { width: 14px; height: 14px; top: 78px; left: 858px; background-color: rgba(93,173,226,0.7); animation: f10 15s ease-in-out infinite; }
        .p11 { width: 10px; height: 10px; top: 28px; left: 948px; background-color: rgba(168,216,240,0.6); animation: f11 19s ease-in-out infinite; }
        .p12 { width: 18px; height: 18px; top: 60px; left: 1060px; background-color: rgba(168,216,240,0.75); animation: f12 17s ease-in-out infinite; }
        .p13 { width: 14px; height: 14px; top: 158px; left: 905px; background-color: rgba(93,173,226,0.6); animation: f13 21s ease-in-out infinite; }
        .p14 { width: 16px; height: 16px; top: 190px; left: 1025px; background-color: rgba(139,92,246,0.6); animation: f14 18s ease-in-out infinite; }
        .p15 { width: 10px; height: 10px; top: 238px; left: 818px; background-color: rgba(139,92,246,0.5); animation: f15 20s ease-in-out infinite; }
        .p16 { width: 12px; height: 12px; top: 248px; left: 1108px; background-color: rgba(93,173,226,0.5); animation: f16 16s ease-in-out infinite; }

        /* ── BOTTOM bridge particles ── */
        .p17 { width: 10px; height: 10px; top: 255px; left: 468px; background-color: rgba(139,92,246,0.4); animation: f17 24s ease-in-out infinite; }
        .p18 { width: 10px; height: 10px; top: 258px; left: 668px; background-color: rgba(93,173,226,0.4); animation: f18 19s ease-in-out infinite; }

        /* ── Ambient ── */
        .p19 { width: 6px; height: 6px; top: 18px;  left: 512px; background-color: rgba(139,92,246,0.3); animation: f19 28s ease-in-out infinite; }
        .p20 { width: 6px; height: 6px; top: 145px; left: 592px; background-color: rgba(93,173,226,0.25); animation: f20 26s ease-in-out infinite; }
        .p21 { width: 6px; height: 6px; top: 192px; left: 702px; background-color: rgba(168,216,240,0.25); animation: f21 23s ease-in-out infinite; }
        .p22 { width: 6px; height: 6px; top: 265px; left: 382px; background-color: rgba(139,92,246,0.25); animation: f22 25s ease-in-out infinite; }

        /* ── Float keyframes ── */
        @keyframes f1  { 0%,100%{transform:translate(0,0)}25%{transform:translate(15px,-20px)}50%{transform:translate(25px,-10px)}75%{transform:translate(10px,8px)} }
        @keyframes f2  { 0%,100%{transform:translate(0,0)}50%{transform:translate(20px,-18px)} }
        @keyframes f3  { 0%,100%{transform:translate(0,0)}50%{transform:translate(-18px,20px)} }
        @keyframes f4  { 0%,100%{transform:translate(0,0)}50%{transform:translate(18px,-15px)} }
        @keyframes f5  { 0%,100%{transform:translate(0,0)}50%{transform:translate(22px,-18px)} }
        @keyframes f6  { 0%,100%{transform:translate(0,0)}25%{transform:translate(-15px,12px)}50%{transform:translate(-20px,20px)}75%{transform:translate(-8px,5px)} }
        @keyframes f7  { 0%,100%{transform:translate(0,0)}50%{transform:translate(18px,-15px)} }
        @keyframes f8  { 0%,100%{transform:translate(0,0)}50%{transform:translate(-15px,20px)} }
        @keyframes f9  { 0%,100%{transform:translate(0,0)}25%{transform:translate(20px,-18px)}50%{transform:translate(15px,-25px)}75%{transform:translate(25px,-8px)} }
        @keyframes f10 { 0%,100%{transform:translate(0,0)}50%{transform:translate(-18px,20px)} }
        @keyframes f11 { 0%,100%{transform:translate(0,0)}50%{transform:translate(-15px,18px)} }
        @keyframes f12 { 0%,100%{transform:translate(0,0)}25%{transform:translate(-18px,15px)}50%{transform:translate(-12px,22px)}75%{transform:translate(-20px,8px)} }
        @keyframes f13 { 0%,100%{transform:translate(0,0)}50%{transform:translate(20px,-18px)} }
        @keyframes f14 { 0%,100%{transform:translate(0,0)}50%{transform:translate(-20px,18px)} }
        @keyframes f15 { 0%,100%{transform:translate(0,0)}50%{transform:translate(-15px,20px)} }
        @keyframes f16 { 0%,100%{transform:translate(0,0)}50%{transform:translate(-18px,-15px)} }
        @keyframes f17 { 0%,100%{transform:translate(0,0)}50%{transform:translate(20px,-18px)} }
        @keyframes f18 { 0%,100%{transform:translate(0,0)}50%{transform:translate(-18px,20px)} }
        @keyframes f19 { 0%,100%{transform:translate(0,0)}50%{transform:translate(18px,15px)} }
        @keyframes f20 { 0%,100%{transform:translate(0,0)}50%{transform:translate(-15px,18px)} }
        @keyframes f21 { 0%,100%{transform:translate(0,0)}50%{transform:translate(18px,-15px)} }
        @keyframes f22 { 0%,100%{transform:translate(0,0)}50%{transform:translate(18px,-12px)} }

