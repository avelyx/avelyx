        <div style="position:absolute;border-radius:50%;width:4px;height:4px;top:225px;left:262px;background-color:rgba(56,189,248,0.3);animation:d8 23s ease-in-out infinite;z-index:3"></div>
        <div style="position:absolute;border-radius:50%;width:4px;height:4px;top:82px;left:858px;background-color:rgba(56,189,248,0.4);animation:d5 15s ease-in-out infinite;z-index:3"></div>
        <div style="position:absolute;border-radius:50%;width:3px;height:3px;top:32px;left:948px;background-color:rgba(14,165,233,0.3);animation:d3 19s ease-in-out infinite;z-index:3"></div>
        <div style="position:absolute;border-radius:50%;width:4px;height:4px;top:162px;left:908px;background-color:rgba(56,189,248,0.35);animation:d4 21s ease-in-out infinite;z-index:3"></div>
