<svg width="100%" viewBox="0 0 1200 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <foreignObject width="100%" height="100%">
    <div xmlns="http://www.w3.org/1999/xhtml">
      <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&amp;family=JetBrains+Mono:wght@400;700&amp;display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        .c { width: 1200px; height: 300px; background: #030014; position: relative; overflow: hidden; font-family: 'Space Grotesk', sans-serif; }

        /* ═══ DEEP SPACE MESH ═══ */
        .mesh {
          position: absolute; top: 0; left: 0; width: 100%; height: 100%;
          background:
            radial-gradient(ellipse 80% 80% at 15% 30%, rgba(0,100,200,0.18) 0%, transparent 50%),
            radial-gradient(ellipse 60% 60% at 85% 70%, rgba(56,189,248,0.12) 0%, transparent 50%),
            radial-gradient(ellipse 50% 50% at 50% 50%, rgba(14,165,233,0.06) 0%, transparent 50%);
          animation: md 14s ease-in-out infinite;
        }
        @keyframes md { 0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(12px,-8px) scale(1.02)} }

        /* ═══ ORBS — dramatic glow spheres ═══ */
        .o1 {
          position:absolute; border-radius:50%;
          width: 400px; height: 400px; top: -160px; left: -80px;
          background-color: rgba(14,165,233,0.2);
          animation: of1 18s ease-in-out infinite;
        }
        .o2 {
          position:absolute; border-radius:50%;
          width: 300px; height: 300px; bottom: -140px; right: -50px;
          background-color: rgba(56,189,248,0.15);
          animation: of2 22s ease-in-out infinite;
        }
        .o3 {
          position:absolute; border-radius:50%;
          width: 200px; height: 200px; top: 30%; left: 52%;
          background-color: rgba(6,182,212,0.06);
          animation: of3 16s ease-in-out infinite;
        }
        @keyframes of1 { 0%,100%{transform:translate(0,0) scale(1)}25%{transform:translate(50px,30px) scale(1.15)}50%{transform:translate(25px,50px) scale(0.95)}75%{transform:translate(60px,15px) scale(1.08)} }
        @keyframes of2 { 0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(-40px,-25px) scale(1.12)}66%{transform:translate(-20px,-40px) scale(0.92)} }
        @keyframes of3 { 0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(-30px,18px) scale(1.2)} }

        /* ═══ GRID OVERLAY ═══ */
        .grid {
          position:absolute; top:0; left:0; width:100%; height:100%;
          background-image:
            linear-gradient(rgba(56,189,248,0.03) 1px, transparent 1px),
            linear-gradient(90deg, rgba(56,189,248,0.03) 1px, transparent 1px);
          background-size: 60px 60px;
        }

        /* ═══ SCANNING BEAM — sweeps across ═══ */
        .scan {
          position:absolute; top:0; left:-100%; width:40%; height:100%;
          background: linear-gradient(90deg, transparent, rgba(56,189,248,0.04), rgba(14,165,233,0.08), rgba(56,189,248,0.04), transparent);
          animation: sweep 8s ease-in-out infinite;
        }
        @keyframes sweep { 0%{left:-40%}100%{left:140%} }

        /* ═══ HORIZONTAL GLOW LINE ═══ */
        .hline {
          position:absolute; top:50%; left:0; width:100%; height:1px;
          background: linear-gradient(90deg, transparent 5%, rgba(56,189,248,0.08) 20%, rgba(14,165,233,0.15) 50%, rgba(56,189,248,0.08) 80%, transparent 95%);
          opacity: 0.6;
        }

        /* ═══ EDGE GLOW — top and bottom ═══ */
        .edge-t {
          position:absolute; top:0; left:0; width:100%; height:1px;
          background: linear-gradient(90deg, transparent, rgba(56,189,248,0.15), rgba(14,165,233,0.25), rgba(56,189,248,0.15), transparent);
        }
        .edge-b {
          position:absolute; bottom:0; left:0; width:100%; height:1px;
          background: linear-gradient(90deg, transparent, rgba(56,189,248,0.1), rgba(14,165,233,0.18), rgba(56,189,248,0.1), transparent);
        }

        /* ═══ CORNER BRACKETS ═══ */
        .corner {
          position:absolute; width:30px; height:30px;
        }
        .ct { top:12px; left:12px; border-top:1px solid rgba(56,189,248,0.2); border-left:1px solid rgba(56,189,248,0.2); }
        .ctr { top:12px; right:12px; border-top:1px solid rgba(56,189,248,0.2); border-right:1px solid rgba(56,189,248,0.2); }
        .cbl { bottom:12px; left:12px; border-bottom:1px solid rgba(56,189,248,0.2); border-left:1px solid rgba(56,189,248,0.2); }
        .cbr { bottom:12px; right:12px; border-bottom:1px solid rgba(56,189,248,0.2); border-right:1px solid rgba(56,189,248,0.2); }

        /* ═══ PARTICLE ANIMATIONS ═══ */
        @keyframes d1 { 0%,100%{transform:translate(0,0)}25%{transform:translate(12px,-16px)}50%{transform:translate(22px,-8px)}75%{transform:translate(8px,6px)} }
        @keyframes d2 { 0%,100%{transform:translate(0,0)}50%{transform:translate(16px,-14px)} }
        @keyframes d3 { 0%,100%{transform:translate(0,0)}50%{transform:translate(-14px,16px)} }
        @keyframes d4 { 0%,100%{transform:translate(0,0)}50%{transform:translate(14px,-12px)} }
        @keyframes d5 { 0%,100%{transform:translate(0,0)}50%{transform:translate(-16px,14px)} }
        @keyframes d6 { 0%,100%{transform:translate(0,0)}25%{transform:translate(-12px,10px)}50%{transform:translate(-18px,16px)}75%{transform:translate(-6px,4px)} }
        @keyframes d7 { 0%,100%{transform:translate(0,0)}50%{transform:translate(14px,-12px)} }
        @keyframes d8 { 0%,100%{transform:translate(0,0)}50%{transform:translate(-12px,16px)} }

        /* ═══ TITLE ═══ */
        @keyframes lr { 0%{opacity:0;transform:translateY(25px) scale(0.85);filter:blur(8px)}60%{opacity:1;transform:translateY(-4px) scale(1.01);filter:blur(0)}100%{opacity:1;transform:translateY(0) scale(1);filter:blur(0)} }
        @keyframes dr { from{opacity:0;transform:scale(0)}to{opacity:1;transform:scale(1)} }
        @keyframes le { to{width:280px} }
        @keyframes fs { from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)} }
        @keyframes bl { 0%,100%{opacity:1}50%{opacity:0} }
        @keyframes gl { 0%,100%{text-shadow:0 0 20px rgba(56,189,248,0),0 0 40px rgba(56,189,248,0)}50%{text-shadow:0 0 20px rgba(56,189,248,0.15),0 0 40px rgba(56,189,248,0.05)} }

        .tw { position:absolute;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:5 }
        .tl { display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:22px }
        .le { font-size:58px;font-weight:700;color:#ffffff;letter-spacing:0.15em;opacity:0;animation:lr 0.8s cubic-bezier(0.16,1,0.3,1) forwards,gl 4s ease-in-out 2s infinite }
        .le:nth-child(1){animation-delay:.3s,.3s}.le:nth-child(3){animation-delay:.5s,.5s}.le:nth-child(5){animation-delay:.7s,.7s}.le:nth-child(7){animation-delay:.9s,.9s}.le:nth-child(9){animation-delay:1.1s,1.1s}.le:nth-child(11){animation-delay:1.3s,1.3s}
        .dt { font-size:16px;color:rgba(56,189,248,0.3);opacity:0;animation:dr 0.5s ease forwards }
        .dt:nth-child(2){animation-delay:.4s}.dt:nth-child(4){animation-delay:.6s}.dt:nth-child(6){animation-delay:.8s}.dt:nth-child(8){animation-delay:1s}.dt:nth-child(10){animation-delay:1.2s}
        .al { width:0;height:1px;background:linear-gradient(90deg,transparent,rgba(56,189,248,0.4),rgba(14,165,233,0.6),rgba(56,189,248,0.4),transparent);margin:18px auto;animation:le 1.2s cubic-bezier(0.16,1,0.3,1) 1.5s forwards }
        .st { font-family:'JetBrains Mono',monospace;font-size:12px;color:rgba(148,163,184,0.5);letter-spacing:0.4em;text-transform:uppercase;opacity:0;animation:fs 1s ease 1.8s forwards;display:flex;align-items:center;justify-content:center;gap:4px }
        .cu { display:inline-block;width:2px;height:12px;background-color:rgba(56,189,248,0.5);animation:bl 1s step-end infinite;margin-left:4px }
      </style>

