<svg width="1200" height="300" viewBox="0 0 1200 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <foreignObject width="100%" height="100%">
    <div xmlns="http://www.w3.org/1999/xhtml">
      <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&amp;family=JetBrains+Mono:wght@400;700&amp;display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        .container {
          width: 1200px; height: 300px; background: #0a0a0a;
          display: flex; flex-direction: column; align-items: center; justify-content: center;
          position: relative; overflow: hidden; font-family: 'Space Grotesk', sans-serif;
        }
        .bg-mesh {
          position: absolute; width: 200%; height: 200%; top: -50%; left: -50%;
          background:
            radial-gradient(ellipse 600px 300px at 20% 50%, rgba(99,102,241,0.08) 0%, transparent 70%),
            radial-gradient(ellipse 500px 250px at 80% 30%, rgba(139,92,246,0.06) 0%, transparent 70%),
            radial-gradient(ellipse 400px 200px at 60% 80%, rgba(59,130,246,0.05) 0%, transparent 70%);
          animation: meshFloat 20s ease-in-out infinite;
        }
        @keyframes meshFloat {
          0%, 100% { transform: translate(0, 0) rotate(0deg); }
          25% { transform: translate(30px, -20px) rotate(1deg); }
          50% { transform: translate(-20px, 15px) rotate(-1deg); }
          75% { transform: translate(15px, 25px) rotate(0.5deg); }
        }
        .grid {
          position: absolute; width: 100%; height: 100%;
          background-image:
            linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
            linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
          background-size: 60px 60px;
          animation: gridPulse 8s ease-in-out infinite;
        }
        @keyframes gridPulse { 0%, 100% { opacity: 0.3; } 50% { opacity: 0.7; } }
        .particle {
          position: absolute; width: 3px; height: 3px; border-radius: 50%;
          background: rgba(139,92,246,0.4);
        }
        .p1 { top: 20%; left: 10%; animation: float1 12s ease-in-out infinite; }
        .p2 { top: 60%; left: 25%; animation: float2 15s ease-in-out infinite; background: rgba(59,130,246,0.3); width: 2px; height: 2px; }
        .p3 { top: 30%; left: 70%; animation: float3 10s ease-in-out infinite; background: rgba(99,102,241,0.5); width: 4px; height: 4px; }
        .p4 { top: 75%; left: 85%; animation: float1 18s ease-in-out infinite reverse; background: rgba(168,85,247,0.3); }
        .p5 { top: 45%; left: 50%; animation: float2 14s ease-in-out infinite; background: rgba(99,102,241,0.2); width: 5px; height: 5px; }
        .p6 { top: 15%; left: 90%; animation: float3 16s ease-in-out infinite; background: rgba(59,130,246,0.4); width: 2px; height: 2px; }
        .p7 { top: 80%; left: 40%; animation: float1 11s ease-in-out infinite; background: rgba(139,92,246,0.3); }
        @keyframes float1 {
          0%, 100% { transform: translate(0, 0); opacity: 0.3; }
          50% { transform: translate(40px, -30px); opacity: 1; }
        }
        @keyframes float2 {
          0%, 100% { transform: translate(0, 0); opacity: 0.5; }
          33% { transform: translate(-25px, 20px); opacity: 0.8; }
          66% { transform: translate(30px, -15px); opacity: 0.3; }
        }
        @keyframes float3 {
          0%, 100% { transform: translate(0, 0); opacity: 0.4; }
          50% { transform: translate(-35px, 25px); opacity: 1; }
        }
        .title-wrap { position: relative; z-index: 2; text-align: center; }
        .title-letters { display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 20px; }
        .letter {
          font-size: 52px; font-weight: 700; color: #ffffff;
          letter-spacing: 0.05em; opacity: 0;
          animation: letterReveal 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        .letter:nth-child(1) { animation-delay: 0.3s; }
        .letter:nth-child(3) { animation-delay: 0.45s; }
        .letter:nth-child(5) { animation-delay: 0.6s; }
        .letter:nth-child(7) { animation-delay: 0.75s; }
        .letter:nth-child(9) { animation-delay: 0.9s; }
        .letter:nth-child(11) { animation-delay: 1.05s; }
        .dot {
          font-size: 18px; color: rgba(139,92,246,0.6);
          opacity: 0; animation: dotReveal 0.4s ease forwards;
        }
        .dot:nth-child(2) { animation-delay: 0.38s; }
        .dot:nth-child(4) { animation-delay: 0.53s; }
        .dot:nth-child(6) { animation-delay: 0.68s; }
        .dot:nth-child(8) { animation-delay: 0.83s; }
        .dot:nth-child(10) { animation-delay: 0.98s; }
        @keyframes letterReveal {
          from { opacity: 0; transform: translateY(30px) scale(0.8); filter: blur(10px); }
          to { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
        }
        @keyframes dotReveal {
          from { opacity: 0; transform: scale(0); }
          to { opacity: 1; transform: scale(1); }
        }
        .subtitle {
          font-family: 'JetBrains Mono', monospace; font-size: 14px;
          color: rgba(255,255,255,0.35); letter-spacing: 0.3em;
          text-transform: uppercase; opacity: 0;
          animation: fadeSlideUp 1s ease 1.4s forwards;
        }
        @keyframes fadeSlideUp {
          from { opacity: 0; transform: translateY(15px); }
          to { opacity: 1; transform: translateY(0); }
        }
        .accent-line {
          width: 0; height: 1px;
          background: linear-gradient(90deg, transparent, rgba(139,92,246,0.5), transparent);
          margin: 16px auto;
          animation: lineExpand 1.2s cubic-bezier(0.16, 1, 0.3, 1) 1.2s forwards;
        }
        @keyframes lineExpand { to { width: 200px; } }
      </style>
      <div class="container">
        <div class="bg-mesh"></div>
        <div class="grid"></div>
        <div class="particle p1"></div>
        <div class="particle p2"></div>
        <div class="particle p3"></div>
        <div class="particle p4"></div>
        <div class="particle p5"></div>
        <div class="particle p6"></div>
        <div class="particle p7"></div>
        <div class="title-wrap">
          <div class="title-letters">
            <span class="letter">A</span>
            <span class="dot">&#183;</span>
            <span class="letter">V</span>
            <span class="dot">&#183;</span>
            <span class="letter">E</span>
            <span class="dot">&#183;</span>
            <span class="letter">L</span>
            <span class="dot">&#183;</span>
            <span class="letter">Y</span>
            <span class="dot">&#183;</span>
            <span class="letter">X</span>
          </div>
          <div class="accent-line"></div>
          <div class="subtitle">ai builder &#183; cloud architect &#183; designer</div>
        </div>
      </div>
    </div>
  </foreignObject>
</svg>
